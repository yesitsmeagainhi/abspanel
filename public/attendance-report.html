<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Report</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; padding: 20px; background: #f4f7f6; color: #333; }
        .container { max-width: 1400px; margin: auto; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 2px 10px rgba(0,0,0,.1); }
        h1 { color: #2c3e50; text-align: center; }
        .filters { display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; align-items: flex-start; }
        .filters label { font-weight: bold; display: block; margin-bottom: 4px; }
        .filters select, .filters input, .filters button { padding: 10px; border-radius: 5px; border: 1px solid #ccc; font-size: 15px; }
        .filters button { background: #3498db; color: #fff; border: none; cursor: pointer; transition: .3s; align-self: flex-end; height: 42px; }
        .filters button:hover { background: #2980b9; }
        .batch-list { max-height: 140px; overflow-y: auto; border: 1px solid #ccc; border-radius: 5px; padding: 8px 12px; background: #fff; min-width: 180px; }
        .batch-list label { display: flex; align-items: center; padding: 3px 0; cursor: pointer; font-size: 14px; gap: 6px; }
        .batch-list input[type="checkbox"] { margin: 0; }
        #loader { text-align: center; padding: 20px; font-size: 18px; display: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 10px 12px; border: 1px solid #ddd; text-align: left; font-size: 14px; }
        th { background: #ecf0f1; color: #2c3e50; position: sticky; top: 0; z-index: 2; }
        tr:nth-child(even) { background: #f9f9f9; }
        .photo-link { color: #3498db; text-decoration: none; font-weight: 500; }
        .photo-link:hover { text-decoration: underline; }
        .no-data { color: #95a5a6; }
        .summary { margin-top: 30px; padding: 15px; background: #ecf0f1; border-radius: 8px; }
        .summary h2 { margin-top: 0; color: #2c3e50; }
        .summary table th { background: #2c3e50; color: #fff; }
        .absent-row td { color: #999; }
        .select-all-row { border-bottom: 1px solid #ddd; padding-bottom: 6px; margin-bottom: 4px; }
        .stats { display: flex; gap: 20px; margin: 15px 0; flex-wrap: wrap; }
        .stat-card { background: #fff; padding: 12px 20px; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,.1); text-align: center; }
        .stat-card .num { font-size: 28px; font-weight: bold; color: #2c3e50; }
        .stat-card .lbl { font-size: 13px; color: #7f8c8d; }
        .export-bar { display: flex; gap: 10px; margin: 15px 0; flex-wrap: wrap; align-items: center; }
        .export-bar button { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-size: 14px; font-weight: 600; transition: .3s; }
        .btn-csv { background: #27ae60; color: #fff; }
        .btn-csv:hover { background: #219a52; }
        .btn-pdf { background: #e74c3c; color: #fff; }
        .btn-pdf:hover { background: #c0392b; }
        .btn-photos { background: #8e44ad; color: #fff; }
        .btn-photos:hover { background: #71368a; }
        .selfie-thumb { width: 60px; height: 60px; object-fit: cover; border-radius: 4px; border: 1px solid #ddd; cursor: pointer; }
        .selfie-thumb:hover { transform: scale(1.1); box-shadow: 0 2px 8px rgba(0,0,0,.3); }
        /* Photo modal */
        .photo-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,.85); z-index: 9999; justify-content: center; align-items: center; cursor: pointer; }
        .photo-modal img { max-width: 90%; max-height: 90%; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,.5); }
        .photo-modal.active { display: flex; }
        /* Print styles */
        @media print {
            .filters, .export-bar, #loader, .no-print { display: none !important; }
            .container { box-shadow: none; max-width: 100%; }
            th { position: static; }
            .selfie-thumb { width: 50px; height: 50px; }
        }
    </style>
</head>
<body>
    <nav class="bg-white shadow sticky top-0 z-20" style="margin:-20px -20px 20px -20px;">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <span class="text-xl font-bold text-indigo-600">Dashboard</span>
                <div class="space-x-2 sm:space-x-4 text-sm font-medium">
                    <a href="/" class="hover:text-indigo-600 transition">Home</a>
                    <a href="lectures.html" class="hover:text-indigo-600 transition">Lectures</a>
                    <a href="students.html" class="hover:text-indigo-600 transition">Students</a>
                    <a href="announcements.html" class="hover:text-indigo-600 transition">Announcements</a>
                    <a href="banners.html" class="hover:text-indigo-600 transition">Banners</a>
                    <a href="result.html" class="hover:text-indigo-600 transition">Result</a>
                    <a href="faculty.html" class="hover:text-indigo-600 transition">Faculty</a>
                    <a href="attendance-report.html" class="text-indigo-600">Attendance</a>
                </div>
            </div>
        </div>
    </nav>
    <div class="container">
        <h1>Attendance Report</h1>
        <div class="filters">
            <div>
                <label for="branch-select">Branch:</label>
                <select id="branch-select"><option value="">Loading...</option></select>
            </div>
            <div>
                <label>Batch(es):</label>
                <div id="batch-list" class="batch-list">Loading...</div>
            </div>
            <div>
                <label for="date-from">From:</label>
                <input type="date" id="date-from">
            </div>
            <div>
                <label for="date-to">To:</label>
                <input type="date" id="date-to">
            </div>
            <div>
                <label>&nbsp;</label>
                <button id="generate-report-btn">Generate Report</button>
            </div>
        </div>

        <div id="loader">Loading report... this may take a moment for large date ranges.</div>

        <div id="stats-area"></div>
        <div id="export-bar" class="export-bar" style="display:none;">
            <button class="btn-csv" id="export-csv-btn">Export CSV</button>
            <button class="btn-pdf" id="export-pdf-btn">Export PDF</button>
            <button class="btn-pdf" id="export-pdf-photos-btn" style="background:#9b59b6;">PDF with Photos</button>
            <button class="btn-photos" id="load-photos-btn">Load Selfie Photos</button>
            <span id="photo-status" style="font-size:13px;color:#7f8c8d;"></span>
        </div>

        <div id="printable-area">
            <table id="report-table" style="display:none;">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Student Name</th>
                        <th>Batch</th>
                        <th>In Time</th>
                        <th>Out Time</th>
                        <th>Duration (Min)</th>
                        <th>In Photo</th>
                        <th>Out Photo</th>
                    </tr>
                </thead>
                <tbody id="report-body"></tbody>
            </table>

            <div id="summary-area"></div>
        </div>
    </div>

    <!-- Photo modal for full-size view -->
    <div class="photo-modal" id="photo-modal">
        <img src="" alt="Selfie" id="modal-img">
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js";
        import { getFirestore, collection, getDocs, getDoc, doc, query, where } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD884mfzzEhPY5icP_hbd8ninH35djZcf8",
            authDomain: "crm-notifi-ca869.firebaseapp.com",
            projectId: "crm-notifi-ca869",
            storageBucket: "crm-notifi-ca869.appspot.com",
            messagingSenderId: "478139440162",
            appId: "1:478139440162:web:c2fe376d543659b168be7b",
            measurementId: "G-R5S63HRY2Z"
        };

        const app = initializeApp(firebaseConfig);
        const db  = getFirestore(app);

        const branchSelect = document.getElementById('branch-select');
        const batchList    = document.getElementById('batch-list');
        const dateFrom     = document.getElementById('date-from');
        const dateTo       = document.getElementById('date-to');
        const generateBtn  = document.getElementById('generate-report-btn');
        const reportBody   = document.getElementById('report-body');
        const reportTable  = document.getElementById('report-table');
        const loader       = document.getElementById('loader');
        const statsArea    = document.getElementById('stats-area');
        const summaryArea  = document.getElementById('summary-area');
        const exportBar    = document.getElementById('export-bar');
        const photoModal   = document.getElementById('photo-modal');
        const modalImg     = document.getElementById('modal-img');

        // Store raw report data for CSV export
        let reportData = [];
        let reportMeta = {};

        // Set default dates
        const today = new Date().toISOString().split('T')[0];
        dateTo.value = today;
        const weekAgo = new Date();
        weekAgo.setDate(weekAgo.getDate() - 7);
        dateFrom.value = weekAgo.toISOString().split('T')[0];

        // Photo modal
        photoModal.addEventListener('click', () => photoModal.classList.remove('active'));
        window.showFullPhoto = (url) => {
            modalImg.src = url;
            photoModal.classList.add('active');
        };

        async function populateFilters() {
            try {
                const configRef = doc(db, "config", "appData");
                const docSnap = await getDoc(configRef);

                if (docSnap.exists()) {
                    const configData = docSnap.data();
                    const branches = configData.branches || [];
                    const batches  = configData.batches  || [];

                    branchSelect.innerHTML = '<option value="">Select Branch</option>';
                    branches.sort().forEach(b => {
                        const o = document.createElement('option');
                        o.value = b; o.textContent = b;
                        branchSelect.appendChild(o);
                    });

                    let html = '<div class="select-all-row"><label><input type="checkbox" id="select-all-batches"> <strong>Select All</strong></label></div>';
                    batches.sort().forEach(b => {
                        html += `<label><input type="checkbox" value="${b}"> ${b}</label>`;
                    });
                    batchList.innerHTML = html;

                    document.getElementById('select-all-batches').addEventListener('change', (e) => {
                        batchList.querySelectorAll('input[type="checkbox"]:not(#select-all-batches)').forEach(cb => {
                            cb.checked = e.target.checked;
                        });
                    });
                } else {
                    branchSelect.innerHTML = '<option value="">Setup needed</option>';
                    batchList.innerHTML = 'Setup needed';
                }
            } catch (e) {
                console.error("Error loading filters:", e);
                branchSelect.innerHTML = '<option value="">Error loading</option>';
                batchList.innerHTML = 'Error loading filters';
            }
        }

        function getDateRange(start, end) {
            const dates = [];
            let current = new Date(start + 'T00:00:00');
            const endDate = new Date(end + 'T00:00:00');
            while (current <= endDate) {
                dates.push(current.toISOString().split('T')[0]);
                current.setDate(current.getDate() + 1);
            }
            return dates;
        }

        const safeToDate = ts => {
            if (!ts) return null;
            return ts.toDate ? ts.toDate() : (ts.seconds ? new Date(ts.seconds * 1000) : ts);
        };

        const formatTime = (ts) => {
            const d = safeToDate(ts);
            if (!d || !(d instanceof Date) || isNaN(d)) return '—';
            return d.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', hour12: true });
        };

        const formatDateDisplay = (dateStr) => {
            const d = new Date(dateStr + 'T00:00:00');
            return d.toLocaleDateString('en-IN', { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' });
        };

        async function generateReport() {
            const branch = branchSelect.value;
            const selectedBatches = [...batchList.querySelectorAll('input[type="checkbox"]:not(#select-all-batches):checked')].map(cb => cb.value);
            const from = dateFrom.value;
            const to   = dateTo.value;

            if (!branch || selectedBatches.length === 0 || !from || !to) {
                alert("Please select branch, at least one batch, and date range.");
                return;
            }
            if (from > to) {
                alert("'From' date must be before 'To' date.");
                return;
            }

            loader.style.display = 'block';
            reportTable.style.display = 'none';
            exportBar.style.display = 'none';
            reportBody.innerHTML = '';
            statsArea.innerHTML = '';
            summaryArea.innerHTML = '';
            reportData = [];
            reportMeta = { branch, batches: selectedBatches, from, to };

            try {
                const batchChunks = [];
                for (let i = 0; i < selectedBatches.length; i += 30) {
                    batchChunks.push(selectedBatches.slice(i, i + 30));
                }

                let allDocs = [];
                for (const chunk of batchChunks) {
                    const q = query(collection(db, "studentattendance"),
                                    where("meta.branch", "==", branch),
                                    where("meta.batch", "in", chunk));
                    const snap = await getDocs(q);
                    snap.forEach(d => allDocs.push({ id: d.id, ...d.data() }));
                }

                if (allDocs.length === 0) {
                    reportBody.innerHTML = '<tr><td colspan="8" class="no-data" style="text-align:center;">No students found for this branch and batch selection.</td></tr>';
                    reportTable.style.display = 'table';
                    loader.style.display = 'none';
                    return;
                }

                const dates = getDateRange(from, to);
                let html = '';
                let totalPresent = 0;
                let totalAbsent  = 0;
                const studentSummary = {};

                allDocs.sort((a, b) => {
                    const nameA = a.name || (a.meta || {}).name || '';
                    const nameB = b.name || (b.meta || {}).name || '';
                    return nameA.localeCompare(nameB);
                });

                dates.forEach(date => {
                    const displayDate = formatDateDisplay(date);

                    allDocs.forEach(data => {
                        const meta = data.meta || {};
                        const studentName = data.name || meta.name || data['meta.name'] || 'Unknown';
                        const batch = meta.batch || data['meta.batch'] || '—';

                        const key = data.id;
                        if (!studentSummary[key]) {
                            studentSummary[key] = { name: studentName, batch, present: 0, total: dates.length };
                        }

                        const getVal = (prop) => {
                            const flatKey = `days.${date}.${prop}`;
                            if (data[flatKey] !== undefined) return data[flatKey];
                            if (data.days && data.days[date]) return data.days[date][prop];
                            return undefined;
                        };

                        const hasIn = getVal('hasIn');

                        if (!hasIn) {
                            // Store absent row data
                            reportData.push({ date, displayDate, studentName, batch, status: 'Absent', inTime: '', outTime: '', duration: '', inPhotoUrl: '', outPhotoUrl: '' });
                            totalAbsent++;

                            html += `<tr class="absent-row">
                                <td>${displayDate}</td>
                                <td>${studentName}</td>
                                <td>${batch}</td>
                                <td colspan="5" class="no-data" style="text-align:center;">Absent</td>
                            </tr>`;
                            return;
                        }

                        totalPresent++;
                        studentSummary[key].present++;

                        const inAt      = getVal('inAt');
                        const outAt     = getVal('outAt');
                        const inAtMs    = getVal('inAtMs');
                        const outAtMs   = getVal('outAtMs');
                        const inPhotoUrl  = getVal('inPhoto') || '';
                        const outPhotoUrl = getVal('outPhoto') || '';

                        const inTime  = formatTime(inAt);
                        const outTime = formatTime(outAt);
                        let duration  = '—';
                        if (inAtMs && outAtMs) {
                            duration = Math.round((outAtMs - inAtMs) / 60000);
                        }

                        // Store present row data
                        reportData.push({ date, displayDate, studentName, batch, status: 'Present', inTime, outTime, duration: duration.toString(), inPhotoUrl, outPhotoUrl });

                        const inPhoto  = inPhotoUrl  ? `<a href="${inPhotoUrl}" target="_blank" class="photo-link" data-photo-url="${inPhotoUrl}">View</a>` : '—';
                        const outPhoto = outPhotoUrl ? `<a href="${outPhotoUrl}" target="_blank" class="photo-link" data-photo-url="${outPhotoUrl}">View</a>` : '—';

                        html += `<tr>
                            <td>${displayDate}</td>
                            <td>${studentName}</td>
                            <td>${batch}</td>
                            <td>${inTime}</td>
                            <td>${outTime}</td>
                            <td>${duration}</td>
                            <td>${inPhoto}</td>
                            <td>${outPhoto}</td>
                        </tr>`;
                    });
                });

                reportBody.innerHTML = html || '<tr><td colspan="8" class="no-data" style="text-align:center;">No attendance data in this range.</td></tr>';
                reportTable.style.display = 'table';
                exportBar.style.display = 'flex';

                // Stats
                statsArea.innerHTML = `<div class="stats">
                    <div class="stat-card"><div class="num">${allDocs.length}</div><div class="lbl">Students</div></div>
                    <div class="stat-card"><div class="num">${dates.length}</div><div class="lbl">Days</div></div>
                    <div class="stat-card"><div class="num">${totalPresent}</div><div class="lbl">Present Entries</div></div>
                    <div class="stat-card"><div class="num">${totalAbsent}</div><div class="lbl">Absent Entries</div></div>
                </div>`;

                // Summary table
                const summaryKeys = Object.keys(studentSummary).sort((a, b) =>
                    studentSummary[a].name.localeCompare(studentSummary[b].name)
                );
                let summaryHtml = `<div class="summary"><h2>Student Summary (${from} to ${to})</h2>
                    <table><thead><tr><th>Student Name</th><th>Batch</th><th>Days Present</th><th>Days Absent</th><th>Attendance %</th></tr></thead><tbody>`;
                summaryKeys.forEach(key => {
                    const s = studentSummary[key];
                    const absent = s.total - s.present;
                    const pct = s.total > 0 ? Math.round((s.present / s.total) * 100) : 0;
                    const color = pct >= 75 ? '#27ae60' : pct >= 50 ? '#f39c12' : '#e74c3c';
                    summaryHtml += `<tr>
                        <td>${s.name}</td>
                        <td>${s.batch}</td>
                        <td>${s.present}</td>
                        <td>${absent}</td>
                        <td style="color:${color};font-weight:bold;">${pct}%</td>
                    </tr>`;
                });
                summaryHtml += '</tbody></table></div>';
                summaryArea.innerHTML = summaryHtml;

            } catch (e) {
                console.error("Report error:", e);
                reportBody.innerHTML = `<tr><td colspan="8" class="no-data" style="text-align:center;color:red;">Error: ${e.message}</td></tr>`;
                reportTable.style.display = 'table';
            }

            loader.style.display = 'none';
        }

        // ─── CSV EXPORT ───
        function exportCSV() {
            if (reportData.length === 0) { alert('No data to export.'); return; }

            const headers = ['Date', 'Student Name', 'Batch', 'Status', 'In Time', 'Out Time', 'Duration (Min)', 'In Photo URL', 'Out Photo URL'];
            const csvRows = [headers.join(',')];

            reportData.forEach(r => {
                const row = [
                    r.date,
                    `"${r.studentName}"`,
                    `"${r.batch}"`,
                    r.status,
                    r.inTime || '',
                    r.outTime || '',
                    r.duration || '',
                    r.inPhotoUrl || '',
                    r.outPhotoUrl || ''
                ];
                csvRows.push(row.join(','));
            });

            const blob = new Blob([csvRows.join('\n')], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `Attendance_${reportMeta.branch}_${reportMeta.from}_to_${reportMeta.to}.csv`;
            a.click();
            URL.revokeObjectURL(url);
        }

        // ─── PDF EXPORT (using jsPDF + autoTable) ───
        function exportPDF() {
            if (reportData.length === 0) { alert('No data to export.'); return; }

            const { jsPDF } = window.jspdf;
            const doc = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a3' });

            const title = `Attendance Report — ${reportMeta.branch}`;
            const subtitle = `${reportMeta.from} to ${reportMeta.to} | Batches: ${reportMeta.batches.join(', ')}`;

            doc.setFontSize(18);
            doc.text(title, doc.internal.pageSize.getWidth() / 2, 15, { align: 'center' });
            doc.setFontSize(11);
            doc.setTextColor(100);
            doc.text(subtitle, doc.internal.pageSize.getWidth() / 2, 22, { align: 'center' });
            doc.setTextColor(0);

            // Main attendance table
            const headers = [['Date', 'Student Name', 'Batch', 'Status', 'In Time', 'Out Time', 'Duration (Min)']];
            const rows = reportData.map(r => [
                r.displayDate,
                r.studentName,
                r.batch,
                r.status,
                r.status === 'Absent' ? '' : (r.inTime || '—'),
                r.status === 'Absent' ? '' : (r.outTime || '—'),
                r.status === 'Absent' ? '' : (r.duration || '—')
            ]);

            doc.autoTable({
                head: headers,
                body: rows,
                startY: 28,
                styles: { fontSize: 9, cellPadding: 3 },
                headStyles: { fillColor: [44, 62, 80], textColor: 255, fontStyle: 'bold' },
                alternateRowStyles: { fillColor: [245, 245, 245] },
                didParseCell: function(data) {
                    // Color absent rows
                    if (data.section === 'body' && data.row.raw[3] === 'Absent') {
                        data.cell.styles.textColor = [180, 180, 180];
                    }
                }
            });

            // Summary table on new page
            const summaryEl = document.querySelector('.summary table');
            if (summaryEl) {
                doc.addPage();
                doc.setFontSize(14);
                doc.text('Student Summary', doc.internal.pageSize.getWidth() / 2, 15, { align: 'center' });

                const sRows = [...summaryEl.querySelectorAll('tbody tr')].map(tr => {
                    const cells = tr.querySelectorAll('td');
                    return [...cells].map(c => c.textContent.trim());
                });

                doc.autoTable({
                    head: [['Student Name', 'Batch', 'Days Present', 'Days Absent', 'Attendance %']],
                    body: sRows,
                    startY: 20,
                    styles: { fontSize: 10, cellPadding: 3 },
                    headStyles: { fillColor: [44, 62, 80], textColor: 255, fontStyle: 'bold' },
                    alternateRowStyles: { fillColor: [245, 245, 245] },
                    didParseCell: function(data) {
                        if (data.section === 'body' && data.column.index === 4) {
                            const pct = parseInt(data.cell.raw);
                            if (pct >= 75) data.cell.styles.textColor = [39, 174, 96];
                            else if (pct >= 50) data.cell.styles.textColor = [243, 156, 18];
                            else data.cell.styles.textColor = [231, 76, 60];
                            data.cell.styles.fontStyle = 'bold';
                        }
                    }
                });
            }

            doc.save(`Attendance_${reportMeta.branch}_${reportMeta.from}_to_${reportMeta.to}.pdf`);
        }

        // ─── PDF WITH PHOTOS (opens print window) ───
        function exportPDFWithPhotos() {
            const printArea = document.getElementById('printable-area');
            if (!printArea || reportData.length === 0) { alert('No data to export.'); return; }

            const win = window.open('', '_blank');
            win.document.write(`<!DOCTYPE html><html><head><title>Attendance Report</title>
            <style>
                body { font-family: Arial, sans-serif; margin: 20px; color: #333; }
                h1 { text-align: center; color: #2c3e50; margin-bottom: 5px; }
                h3 { text-align: center; color: #666; margin-top: 0; }
                table { width: 100%; border-collapse: collapse; margin-top: 15px; page-break-inside: auto; }
                tr { page-break-inside: avoid; }
                th, td { padding: 8px 10px; border: 1px solid #ccc; text-align: left; font-size: 12px; }
                th { background: #2c3e50; color: #fff; }
                tr:nth-child(even) { background: #f5f5f5; }
                .absent td { color: #aaa; }
                img { width: 55px; height: 55px; object-fit: cover; border-radius: 3px; }
                .summary { margin-top: 30px; }
                .summary th { background: #2c3e50; color: #fff; }
                @media print { body { margin: 10px; } }
            </style></head><body>
            <h1>Attendance Report — ${reportMeta.branch}</h1>
            <h3>${reportMeta.from} to ${reportMeta.to} | ${reportMeta.batches.join(', ')}</h3>
            ${printArea.innerHTML}
            </body></html>`);
            win.document.close();
            setTimeout(() => { win.print(); }, 1500);
        }

        // ─── LOAD SELFIE PHOTOS INLINE ───
        function loadPhotosInline() {
            const links = reportBody.querySelectorAll('a.photo-link[data-photo-url]');
            if (links.length === 0) {
                alert('No photo links found in the report. Photos may not have been uploaded (Storage rules expired).');
                return;
            }

            const statusEl = document.getElementById('photo-status');
            statusEl.textContent = `Loading ${links.length} photos...`;

            let loaded = 0;
            let failed = 0;

            links.forEach(link => {
                const url = link.getAttribute('data-photo-url');
                const img = document.createElement('img');
                img.src = url;
                img.className = 'selfie-thumb';
                img.alt = 'Selfie';
                img.title = 'Click to enlarge';
                img.onclick = () => showFullPhoto(url);
                img.onload = () => {
                    loaded++;
                    statusEl.textContent = `Loaded ${loaded}/${links.length} photos` + (failed ? ` (${failed} failed)` : '');
                };
                img.onerror = () => {
                    failed++;
                    img.style.display = 'none';
                    const span = document.createElement('span');
                    span.className = 'no-data';
                    span.textContent = 'Failed';
                    link.parentNode.appendChild(span);
                    statusEl.textContent = `Loaded ${loaded}/${links.length} photos (${failed} failed)`;
                };

                link.replaceWith(img);
            });

            // Rename button
            document.getElementById('load-photos-btn').textContent = 'Photos Loaded';
            document.getElementById('load-photos-btn').disabled = true;
        }

        // ─── EVENT LISTENERS ───
        generateBtn.addEventListener('click', generateReport);
        document.getElementById('export-csv-btn').addEventListener('click', exportCSV);
        document.getElementById('export-pdf-btn').addEventListener('click', exportPDF);
        document.getElementById('export-pdf-photos-btn').addEventListener('click', exportPDFWithPhotos);
        document.getElementById('load-photos-btn').addEventListener('click', loadPhotosInline);
        document.addEventListener('DOMContentLoaded', populateFilters);
    </script>
</body>
</html>
