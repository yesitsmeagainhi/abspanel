<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Branch & Batch Attendance Summary</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css"/>
    <style>
        body { padding: 1.5rem; }
        main.container { max-width: 1000px; }
        .grid { grid-template-columns: 1fr 1fr; }
        .full-width { grid-column: 1 / -1; }
        thead { position: sticky; top: 0; }
        td[rowspan] { vertical-align: middle; font-weight: bold; }
        .present-count { color: var(--pico-color-green-500, #27ae60); font-weight: bold; }
        .absent-count { color: var(--pico-color-red-500, #e74c3c); font-weight: bold; }
        .holiday-count { color: var(--pico-color-amber-500, #f39c12); font-weight: bold; }
        .no-data-row td { text-align: center; padding: 2rem; }
        #theme-switcher { position: absolute; top: 1.5rem; right: 1.5rem; }
    </style>
</head>
<body>
    <main class="container">
        <a href="#" id="theme-switcher" data-tooltip="Toggle Theme" aria-label="Toggle Theme">◐</a>
        
        <header style="text-align: center;">
            <h1>Attendance Summary Report 📊</h1>
            <p>View total present, absent, and holiday counts grouped by branch and batch.</p>
        </header>

        <article>
            <div class="grid">
                <div><label for="from-date-picker">From Date</label><input type="date" id="from-date-picker"></div>
                <div><label for="to-date-picker">To Date</label><input type="date" id="to-date-picker"></div>
                <div><label for="branch-select">Filter by Branch</label><select id="branch-select"><option value="">All Branches</option></select></div>
                <div><label for="batch-select">Filter by Batch</label><select id="batch-select"><option value="">All Batches</option></select></div>
            </div>
            <div class="grid full-width">
                <button id="generate-btn">📊 Generate Summary</button>
                <button id="download-btn" class="secondary" disabled>⬇️ Download CSV</button>
            </div>
        </article>

        <div id="loader" aria-busy="true" style="display: none; text-align: center; margin-top: 2rem;">Aggregating data...</div>

        <section id="summary-section" style="display: none;">
            <hr>
            <h2>Summary for <span id="date-range-display"></span></h2>
            <figure>
                <div role="group">
                    <table>
                        <thead>
                            <tr>
                                <th>Branch</th>
                                <th>Batch</th>
                                <th>Total Students</th>
                                <th>Present Days</th>
                                <th>Absent Days</th>
                                <th>Holidays</th>
                            </tr>
                        </thead>
                        <tbody id="summary-tbody"></tbody>
                    </table>
                </div>
            </figure>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, getDoc, query, where } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore.js";
        
        const firebaseConfig = { apiKey: "AIzaSyD884mfzzEhPY5icP_hbd8ninH35djZcf8", authDomain: "crm-notifi-ca869.firebaseapp.com", projectId: "crm-notifi-ca869", storageBucket: "crm-notifi-ca869.appspot.com", messagingSenderId: "478139440162", appId: "1:478139440162:web:c2fe376d543659b168be7b", measurementId: "G-R5S63HRY2Z" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const fromDatePicker = document.getElementById('from-date-picker');
        const toDatePicker = document.getElementById('to-date-picker');
        const branchSelect = document.getElementById('branch-select');
        const batchSelect = document.getElementById('batch-select');
        const generateBtn = document.getElementById('generate-btn');
        const downloadBtn = document.getElementById('download-btn');
        const loader = document.getElementById('loader');
        const summarySection = document.getElementById('summary-section');
        const summaryTbody = document.getElementById('summary-tbody');
        const dateRangeDisplay = document.getElementById('date-range-display');
        const themeSwitcher = document.getElementById('theme-switcher');

        let summaryDataForExport = [];
        
        async function populateFilters() {
            try {
                const configRef = doc(db, "config", "appData");
                const docSnap = await getDoc(configRef);
                if (docSnap.exists()) {
                    const { branches = [], batches = [] } = docSnap.data();
                    branchSelect.innerHTML = '<option value="">All Branches</option>' + branches.sort().map(b => `<option value="${b}">${b}</option>`).join('');
                    batchSelect.innerHTML = '<option value="">All Batches</option>' + batches.sort().map(b => `<option value="${b}">${b}</option>`).join('');
                } else {
                     console.warn("Could not find 'config/appData' document. Filters will be empty.");
                }
            } catch (e) {
                console.error("Error loading filters:", e);
                alert("Could not load filters. Check the console (F12) for errors.");
            }
        }

        async function fetchHolidays(fromDateStr, toDateStr, branch, batch) {
            try {
                const dateStrings = [];
                const start = new Date(fromDateStr);
                const end = new Date(toDateStr);
                for (let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) {
                    dateStrings.push(d.toISOString().split('T')[0]);
                }

                let q = collection(db, "lectures");
                const conditions = [where("mode", "==", "No Lecture")];
                
                if (branch) {
                    conditions.push(where("branch", "==", branch));
                }
                if (batch) {
                    conditions.push(where("batch", "==", batch));
                }
                
                if (conditions.length > 0) {
                    q = query(q, ...conditions);
                }

                const snapshot = await getDocs(q);
                const holidays = {};
                
                snapshot.docs.forEach(doc => {
                    const data = doc.data();
                    const holidayDate = data.date;
                    
                    if (dateStrings.includes(holidayDate)) {
                        const key = `${data.branch}|${data.batch}|${holidayDate}`;
                        holidays[key] = {
                            subject: data.subject || 'Holiday',
                            branch: data.branch,
                            batch: data.batch,
                            date: holidayDate
                        };
                    }
                });

                return holidays;
            } catch (error) {
                console.error("Error fetching holidays:", error);
                return {};
            }
        }

        async function generateSummary() {
            const fromDateStr = fromDatePicker.value;
            const toDateStr = toDatePicker.value;
            const selectedBranch = branchSelect.value;
            const selectedBatch = batchSelect.value;
            
            if (!fromDateStr || !toDateStr) { alert("Please select a valid date range."); return; }
            if (fromDateStr > toDateStr) { alert("'From' date cannot be after 'To' date."); return; }

            loader.style.display = 'block';
            summarySection.style.display = 'none';
            downloadBtn.disabled = true;

            const dateStrings = [];
            for (let d = new Date(fromDateStr); d <= new Date(toDateStr); d.setDate(d.getDate() + 1)) {
                dateStrings.push(d.toISOString().split('T')[0]);
            }
            
            const summaryData = {}; // Structure: { branch: { batch: { present: 0, absent: 0, holiday: 0, students: new Set() } } }

            try {
                // Fetch holidays first
                const holidays = await fetchHolidays(fromDateStr, toDateStr, selectedBranch, selectedBatch);

                let q = collection(db, "studentattendance");
                const conditions = [];
                if (selectedBranch) conditions.push(where("meta.branch", "==", selectedBranch));
                if (selectedBatch) conditions.push(where("meta.batch", "==", selectedBatch));
                if (conditions.length > 0) q = query(q, ...conditions);
                
                const snapshot = await getDocs(q);
                
                snapshot.forEach(doc => {
                    const studentId = doc.id;
                    const studentData = doc.data();
                    const branch = studentData.meta?.branch || 'N/A';
                    const batch = studentData.meta?.batch || 'N/A';

                    if (!summaryData[branch]) summaryData[branch] = {};
                    if (!summaryData[branch][batch]) {
                        summaryData[branch][batch] = { present: 0, absent: 0, holiday: 0, students: new Set() };
                    }
                    
                    summaryData[branch][batch].students.add(studentId);
                    
                    dateStrings.forEach(dateStr => {
                        const holidayKey = `${branch}|${batch}|${dateStr}`;
                        const isHoliday = holidays[holidayKey];

                        if (isHoliday) {
                            summaryData[branch][batch].holiday++;
                        } else if (studentData[`days.${dateStr}.hasIn`]) {
                            summaryData[branch][batch].present++;
                        } else {
                            summaryData[branch][batch].absent++;
                        }
                    });
                });
                
                displaySummary(summaryData);
                dateRangeDisplay.textContent = `${fromDateStr} to ${toDateStr}`;
                downloadBtn.disabled = false;

            } catch (error) {
                console.error("Error generating summary:", error);
                alert("An error occurred. Check the console for details.");
            } finally {
                loader.style.display = 'none';
            }
        }

        function displaySummary(data) {
            summaryTbody.innerHTML = '';
            summaryDataForExport = [];
            const branches = Object.keys(data).sort();

            if (branches.length === 0) {
                summaryTbody.innerHTML = `<tr class="no-data-row"><td colspan="6">No data found for the selected criteria.</td></tr>`;
            } else {
                branches.forEach(branch => {
                    const batches = Object.keys(data[branch]).sort();
                    batches.forEach((batch, index) => {
                        const counts = data[branch][batch];
                        const tr = document.createElement('tr');
                        const branchCell = (index === 0) ? `<td rowspan="${batches.length}">${branch}</td>` : '';
                        
                        tr.innerHTML = `
                            ${branchCell}
                            <td>${batch}</td>
                            <td>${counts.students.size}</td>
                            <td class="present-count">${counts.present}</td>
                            <td class="absent-count">${counts.absent}</td>
                            <td class="holiday-count">${counts.holiday}</td>
                        `;
                        summaryTbody.appendChild(tr);

                        summaryDataForExport.push({
                            Branch: branch,
                            Batch: batch,
                            Total_Students: counts.students.size,
                            Present_Days: counts.present,
                            Absent_Days: counts.absent,
                            Holidays: counts.holiday
                        });
                    });
                });
            }
            summarySection.style.display = 'block';
        }

        function handleDownload() {
            if (summaryDataForExport.length === 0) { alert("Please generate a summary first."); return; }
            const filename = `Attendance_Summary_${fromDatePicker.value}_to_${toDatePicker.value}.csv`;
            exportToCSV(summaryDataForExport, filename);
        }

        function exportToCSV(data, filename) {
             const headers = Object.keys(data[0]);
             const csvRows = [headers.join(',')];
             for (const row of data) {
                 const values = headers.map(header => `"${row[header]}"`);
                 csvRows.push(values.join(','));
             }
             const blob = new Blob([csvRows.join('\n')], { type: 'text/csv;charset=utf-8;' });
             const link = document.createElement('a');
             link.href = URL.createObjectURL(blob);
             link.download = filename;
             document.body.appendChild(link);
             link.click();
             document.body.removeChild(link);
        }
        
        generateBtn.addEventListener('click', generateSummary);
        downloadBtn.addEventListener('click', handleDownload);

        themeSwitcher.addEventListener('click', (e) => {
            e.preventDefault();
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-theme') || 'light';
            html.setAttribute('data-theme', currentTheme === 'light' ? 'dark' : 'light');
        });

        document.addEventListener('DOMContentLoaded', () => {
            const today = new Date().toISOString().split('T')[0];
            fromDatePicker.value = today;
            toDatePicker.value = today;
            populateFilters();
        });
    </script>
</body>
</html>
